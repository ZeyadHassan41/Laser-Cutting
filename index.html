        <!-- =========================================================

        <!-- Responsive scaling for mobile devices -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Page title shown in browser tab -->
        <title>FabcConnect — Laser Cutting Time</title>

        <!-- Main stylesheet -->
        <link rel="stylesheet" href="css/style.css" />
    </head>

    <body>
        <!-- =========================================================
         HEADER / NAVBAR
         Contains project logo and documentation link
         ========================================================= -->
        <header>
            <div class="hdr">
                <!-- Brand logo -->
                <a href="#" class="logo">
                    <!-- <div class="logo-icon">⚡</div> -->
                    <span class="logo-text">FabcConnect</span>
                    <span class="logo-tag">Laser Time</span>
                </a>

                <!-- Navigation -->
                <nav>
                    <!-- Opens documentation in new tab -->
                    <!-- <a href="README.md" target="_blank">Equations &amp; Docs</a> -->
                </nav>
            </div>
        </header>

        <!-- =========================================================
         MAIN PAGE CONTENT
         ========================================================= -->
        <main>
            <div class="page">
                <!-- =================================================
                 HERO SECTION
                 Currently disabled but kept for future UI
                 ================================================= -->
                <section class="hero">
                    <!--
                <div class="hero-tag">G-Code Laser Analyser</div>

                <h1>
                    Drop G-Code.
                    <br />
                    Get <span>Cutting Time.</span>
                </h1>

                <p>
                    Instantly calculates laser job time from your
                    G-code — no settings needed.
                </p>
                --></section>

                <!-- =================================================
                 ERROR MESSAGE AREA
                 Hidden until a parsing or upload error occurs
                 ================================================= -->
                <div id="err" class="hidden"></div>

                <!-- =================================================
                 FILE UPLOAD / DROP ZONE
                 Allows drag & drop or click to upload G-code
                 ================================================= -->
                <div
                    id="dropzone"
                    role="button"
                    tabindex="0"
                    aria-label="Upload G-code file"
                >
                    <!-- Upload icon -->
                    <span class="drop-glyph">🔴</span>

                    <!-- Upload instruction -->
                    <div id="drop-label">
                        Drop G-code here or click to browse
                    </div>

                    <!-- Supported file formats -->
                    <div class="drop-formats">
                        <!--
                    <span class="fmt">.NC</span>
                    -->

                        <span class="fmt">.GCODE</span>

                        <!--
                    <span class="fmt">.NGC</span>
                    <span class="fmt">.GC</span>
                    <span class="fmt">.TAP</span>
                    <span class="fmt">.G</span>
                    --></div>

                    <!-- Optional software compatibility hint -->
                    <!--
                <div class="drop-note">
                    LightBurn · LaserGRBL · RDWorks · Marlin · Grbl
                </div>
                --></div>

                <!-- =================================================
                 HIDDEN FILE INPUT
                 Triggered programmatically when dropzone clicked
                 ================================================= -->
                <input
                    type="file"
                    id="file-input"
                    accept=".nc,.gcode,.gc,.ngc,.cnc,.tap,.g"
                    style="display:none"
                />

                <!-- =================================================
                 RESULTS SECTION
                 Hidden until a G-code file is successfully parsed
                 ================================================= -->
                <div id="results" class="hidden">
                    <!-- =============================================
                     TOTAL ESTIMATED TIME DISPLAY
                     ============================================= -->
                    <div class="time-hero">
                        <!-- Label -->
                        <div class="eyebrow">
                            ⏱ Total Estimated Cutting Time
                        </div>

                        <!-- Large time result -->
                        <div class="big-time" id="res-total">—</div>

                        <!-- Uploaded filename -->
                        <div class="filename" id="res-filename"></div>
                    </div>

                    <!-- =============================================
                     SUMMARY CARDS
                     Displays breakdown of time components
                     ============================================= -->
                    <!-- <div class="trio">
                        Laser cutting time
                        <div class="trio-card cut">
                            <div class="tc-label">

                                Laser On

                            <div class="tc-val" id="card-cut">—</div>
                        </div>

                        <div class="trio-card rapid">
                            <div class="tc-label">

                                Rapid Travel
                            </div>

                            <div class="tc-val" id="card-rapid">—</div>
                        </div>

                        <div class="trio-card pierce">
                            <div class="tc-label">
                                <span>⚡</span>
                                Pierce Dwell
                            </div>

                            <div class="tc-val" id="card-pierce">—</div>
                        </div>
                    </div> -->

                    <!-- =================================================
                     TIME DISTRIBUTION CHART (DISABLED)
                     Visual percentage bars for cut / rapid / pierce
                     ================================================= -->

                    <!--
                Bar chart code removed temporarily.
                Keep here for future visualization feature.
                -->

                     ADVANCED FILE STATISTICS (DISABLED)

                     ================================================= -->

                    <!--
                Statistics panel disabled for minimal UI version.
                Contains:
                    - Distance metrics
                    - Move counts

                --></div>
                <!-- End Results Section -->
            </div>
        </main>
